name: Bug Report
description: Report a reproducible Yode defect
title: "bug: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What broke, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Provide exact commands, prompts, files, or terminal steps.
      placeholder: |
        1. Run `yode ...`
        2. Enter `...`
        3. Observe `...`
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include OS, shell, terminal, Yode version, provider, and model.
      placeholder: |
        OS:
        Shell:
        Terminal:
        yode --version:
        Provider/model:
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Paste relevant log excerpts. Redact secrets.
      render: text
