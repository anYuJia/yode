name: CI

on:
  push:
    branches:
      - main
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust Check And Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Cargo check
        run: cargo check

      - name: Workspace library tests
        run: cargo test --workspace --lib

      - name: Provider integration tests
        run: cargo test --test anthropic_integration

      - name: Artifact smoke verification
        run: bash scripts/verify-compact-artifacts.sh
