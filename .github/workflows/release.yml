name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            use_cross: false
          # Linux ARM64 (cross-compile)
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            use_cross: true
          # macOS x86_64
          - target: x86_64-apple-darwin
            runner: macos-latest
            use_cross: false
          # macOS ARM64 (M1/M2/M3)
          - target: aarch64-apple-darwin
            runner: macos-latest
            use_cross: false
          # Windows x86_64
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            use_cross: false
          # Windows ARM64 (cross-compile)
          - target: aarch64-pc-windows-msvc
            runner: ubuntu-latest
            use_cross: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (for cross-compilation)
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Install OpenSSL dev (Linux native)
        if: runner.os == 'Linux' && !matrix.use_cross
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config

      - name: Build (native)
        if: !matrix.use_cross
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Strip binary (Unix native)
        if: runner.os != 'Windows' && !matrix.use_cross
        run: strip "target/${{ matrix.target }}/release/yode" || true

      - name: Strip binary (Unix cross)
        if: runner.os != 'Windows' && matrix.use_cross
        run: strip "target/${{ matrix.target }}/release/yode" || true

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          ARCHIVE="yode-${{ matrix.target }}.tar.gz"
          tar -czf "$ARCHIVE" \
            -C "target/${{ matrix.target }}/release" yode \
            -C "${{ github.workspace }}" LICENSE
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $archive = "yode-${{ matrix.target }}.zip"
          Compress-Archive -Path "target/${{ matrix.target }}/release/yode.exe", "LICENSE" -DestinationPath $archive
          echo "ARCHIVE=$archive" >> $env:GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: yode-${{ matrix.target }}
          path: ${{ env.ARCHIVE }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      # Generate SHA256 checksums for all release artifacts
      - name: Generate SHA256 checksums
        run: |
          cd artifacts
          if command -v sha256sum >dev/null 2>&1; then
            sha256sum *.tar.gz *.zip > SHA256SUMS
          else
            shasum -a 256 *.tar.gz *.zip > SHA256SUMS
          fi
          cat SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/*.tar.gz
            artifacts/*.zip
            artifacts/SHA256SUMS
