name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    name: Build App ${{ matrix.display_name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            display_name: Linux x86_64
            runner: ubuntu-latest
          - target: x86_64-apple-darwin
            display_name: macOS Intel
            runner: macos-15-intel
          - target: aarch64-apple-darwin
            display_name: macOS Apple Silicon
            runner: macos-14
          - target: x86_64-pc-windows-msvc
            display_name: Windows x86_64
            runner: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libappindicator3-dev \
            librsvg2-dev \
            libwebkit2gtk-4.1-dev \
            patchelf

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/yode-desktop/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: apps/yode-desktop
        run: |
          pnpm install --frozen-lockfile

      - name: Build and publish desktop app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/yode-desktop
          tagName: ${{ github.ref_name }}
          releaseName: Yode Desktop ${{ github.ref_name }}
          releaseBody: "Yode 桌面应用发布。"
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}
