# Yode 默认配置

[llm]
# 默认 LLM 提供商和模型
default_provider = "openai"
default_model = "gpt-4o"

[llm.providers.openai]
format = "openai"
base_url = "https://api.openai.com/v1"

[llm.providers.anthropic]
format = "anthropic"
base_url = "https://api.anthropic.com"

[tools]
# Bash 工具超时（秒）
bash_timeout = 120
# 需要确认的工具列表
require_confirmation = ["bash", "write_file", "edit_file"]

[session]
# 会话数据库路径（空则使用默认 ~/.yode/sessions.db）
db_path = ""

[ui]
# 语言：zh-CN, en
language = "zh-CN"
# 主题：dark, light
theme = "dark"

[update]
# 是否自动检查更新 (true=启用，false=禁用)
# 禁用后启动时不会检测新版本，也不会提示更新
auto_check = true
# 是否自动后台下载更新 (true=启用，false=禁用)
# 启用后检测到新版本会自动下载安装包
# 禁用后仅提示有新版本，需要手动下载
auto_download = true
