<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 112" role="img" aria-labelledby="title desc">
  <title id="title">Yode Dark Logo</title>
  <desc id="desc">Yode wordmark with the corporate 3D fluid ribbon Y-logo for dark themes.</desc>
  <defs>
    <!-- Background Gradient for Icon -->
    <linearGradient id="bg-grad-logo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#050811"/>
    </linearGradient>

    <!-- Super-ellipse / Squircle Border Gradient -->
    <linearGradient id="border-grad-logo" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0.02"/>
    </linearGradient>

    <!-- Left Ribbon Gradient -->
    <linearGradient id="left-ribbon-grad-logo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F2FE"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>

    <!-- Right Ribbon Gradient -->
    <linearGradient id="right-ribbon-grad-logo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>

    <!-- Specular Highlight Gradient -->
    <linearGradient id="highlight-grad-logo" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.0"/>
    </linearGradient>

    <!-- Clean drop shadow -->
    <filter id="overlap-shadow-logo" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="-3" dy="6" stdDeviation="6" flood-color="#000000" flood-opacity="0.5"/>
    </filter>

    <!-- Soft core glow -->
    <filter id="core-glow-logo" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Embed Scale-Down Icon inside Logo -->
  <g transform="translate(14, 14) scale(0.164)">
    <!-- Squircle App Icon Base -->
    <rect x="32" y="32" width="448" height="448" rx="108" fill="url(#bg-grad-logo)"/>
    <rect x="32" y="32" width="448" height="448" rx="108" fill="none" stroke="url(#border-grad-logo)" stroke-width="1.5"/>

    <!-- Main Corporate Ribbon Y-Mark -->
    <g>
      <!-- Left Fluid Ribbon -->
      <path d="M 140 160 C 140 135, 175 135, 195 160 C 225 195, 256 240, 256 280 L 256 365 C 256 395, 220 395, 220 365 L 220 285 C 177 240, 140 190, 140 160 Z" fill="url(#left-ribbon-grad-logo)" opacity="0.98"/>

      <!-- Right Fluid Ribbon -->
      <path d="M 372 160 C 372 135, 337 135, 317 160 C 287 195, 256 240, 256 280 L 256 365 C 256 395, 292 395, 292 365 L 292 285 C 335 240, 372 190, 372 160 Z" fill="url(#right-ribbon-grad-logo)" filter="url(#overlap-shadow-logo)" opacity="0.98"/>

      <!-- Specular highlights -->
      <path d="M 144 163 C 144 150, 168 150, 185 170 C 215 205, 246 250, 246 290" fill="none" stroke="url(#highlight-grad-logo)" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
      <path d="M 368 163 C 368 150, 344 150, 327 170 C 297 205, 266 250, 266 290" fill="none" stroke="url(#highlight-grad-logo)" stroke-width="4" stroke-linecap="round" opacity="0.6"/>

    </g>

    <!-- Glowing Light Core -->
    <circle cx="256" cy="280" r="3.5" fill="#FFFFFF" opacity="0.95" filter="url(#core-glow-logo)"/>
  </g>

  <!-- Wordmark -->
  <text x="120" y="74" fill="#F8FAFC" font-family="Inter, 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="56" font-weight="800" letter-spacing="-0.03em">yode</text>
</svg>
